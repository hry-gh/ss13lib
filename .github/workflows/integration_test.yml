name: Integration Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Checkout ss13hub
        uses: actions/checkout@v4
        with:
          repository: hry-gh/ss13hub
          path: ss13hub

      - name: Restore BYOND from cache
        uses: ./.github/actions/restore_or_install_byond

      - name: Install BYOND 32-bit dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y -o APT::Immediate-Configure=false libc6-i386 libstdc++6:i386 libgcc-s1:i386 zlib1g:i386 libcurl4:i386

      - name: Install Wine and Xvfb
        run: |
          sudo apt-get install -y wine64 wine32 xvfb winetricks

      - name: Install Wine VC++ runtime
        run: |
          xvfb-run -a winetricks -q vcrun2015

      - name: Restore Windows BYOND cache
        id: restore_byond_win_cache
        uses: actions/cache/restore@v4
        with:
          path: ~/BYOND-win
          key: ${{ runner.os }}-byond-win-${{ env.BYOND_MAJOR }}-${{ env.BYOND_MINOR }}

      - name: Install Windows BYOND (for DreamSeeker)
        if: ${{ !steps.restore_byond_win_cache.outputs.cache-hit }}
        run: |
          mkdir -p "$HOME/BYOND-win"
          cd "$HOME/BYOND-win"
          curl -f "http://www.byond.com/download/build/${BYOND_MAJOR}/${BYOND_MAJOR}.${BYOND_MINOR}_byond.zip" -o byond-win.zip \
            || curl -f "https://byond-builds.dm-lang.org/${BYOND_MAJOR}/${BYOND_MAJOR}.${BYOND_MINOR}_byond.zip" -o byond-win.zip \
            || { echo "Failed to download Windows BYOND"; exit 1; }
          unzip byond-win.zip
          rm byond-win.zip

      - name: Save Windows BYOND cache
        if: ${{ !steps.restore_byond_win_cache.outputs.cache-hit }}
        uses: actions/cache/save@v4
        with:
          path: ~/BYOND-win
          key: ${{ steps.restore_byond_win_cache.outputs.cache-primary-key }}

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ss13hub/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ss13hub/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build ss13hub
        working-directory: ss13hub
        run: cargo build

      - name: Install Python test dependencies
        run: pip install pymongo

      - name: Run integration tests
        run: |
          source $HOME/BYOND/byond/bin/byondsetup
          python3 tests/run_integration_test.py
        env:
          SS13HUB_DIR: ${{ github.workspace }}/ss13hub
          MONGO_URL: mongodb://localhost:27017
          MONGO_DB: ss13hub_test
          DREAMSEEKER_EXE: /home/runner/BYOND-win/byond/bin/dreamseeker.exe
